<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>男频版原创短剧生成器</title>
<style>
:root{--accent:#245b84;--accent-soft:#eaf3f8;--accent-border:#9fc5da;--ink:#1a1a18;--muted:#77756f;--line:#e4e1d9;--paper:#fff;--canvas:#f5f4f0;--danger:#a32d2d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;background:var(--canvas);color:var(--ink);min-height:100vh}
button,input,select,textarea{font:inherit}
button{color:inherit}
.container{max-width:820px;margin:0 auto;padding:24px 16px 44px}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px}
h1{font-size:22px;font-weight:700;line-height:1.25;margin-bottom:6px}
.subtitle{font-size:12px;color:var(--muted);line-height:1.65;max-width:680px}
.edition{flex:none;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);padding:5px 9px;border-radius:999px}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;position:sticky;top:0;z-index:5;padding:8px 0;background:linear-gradient(var(--canvas) 80%,transparent)}
.tab{padding:8px 16px;border-radius:9px;border:1px solid #d8d6cf;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:.15s}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pnl{display:none}.pnl.on{display:block}
.card{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:17px 18px;margin-bottom:12px;box-shadow:0 1px 0 rgba(31,30,27,.02)}
.sec{font-size:14px;font-weight:700;margin-bottom:11px}.sec small{font-weight:400;color:#999;margin-left:5px}
label{font-size:11px;color:#85827b;display:block;margin-bottom:5px}
select,input,textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #d8d6cf;background:#fff;color:var(--ink);outline:none}
select:focus,input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
textarea{resize:vertical;line-height:1.65;min-height:66px}
input:disabled{background:#f2f1ed;color:#aaa;cursor:not-allowed}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:11px}.r3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.f{margin-bottom:11px}.r2 .f,.r3 .f{margin-bottom:0}
.trow{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{padding:5px 10px;border-radius:8px;font-size:12px;border:1px solid #dfddd6;cursor:pointer;background:#f7f6f2;color:#68665f;transition:.12s;user-select:none}
.tag:hover{border-color:var(--accent-border);color:var(--accent)}
.tag.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border);font-weight:600}
.slabel{font-size:11px;color:#9a978f;margin:11px 0 4px;font-weight:700;letter-spacing:.2px}
.tip{font-size:11px;color:#9a978f;margin-top:7px;line-height:1.65}.tip strong{color:#55524c}
.badge{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-border);margin-left:6px;vertical-align:1px}
.ctabs{display:flex;gap:6px;margin-bottom:11px;overflow-x:auto;padding-bottom:2px}
.ct{white-space:nowrap;padding:6px 13px;border-radius:8px;border:1px solid #d8d6cf;font-size:12px;cursor:pointer;background:#fff;color:#666}
.ct.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border);font-weight:600}
.cpnl{display:none}.cpnl.on{display:block}
.nrow{display:flex;align-items:center;gap:7px}.nrow input{flex:1}.nrow button{flex:none}
.rbtn,.nbtn,.copy-btn{padding:7px 12px;border-radius:8px;border:1px solid #d8d6cf;font-size:12px;cursor:pointer;background:#f6f5f1;color:#666}
.rbtn:hover,.nbtn:hover{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent)}
.nbtn{padding:9px 18px;color:var(--ink);font-weight:600;margin-top:4px}
.sbtn{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;background:var(--ink);color:#fff;margin-top:4px;letter-spacing:.2px}.sbtn:hover{background:#42413d}
.bx{background:#f6f5f1;border-radius:8px;padding:9px 11px;margin-top:6px;font-size:11px;color:#85827b;line-height:1.7;min-height:40px}.bx b{color:var(--ink)}.bx .neg{color:var(--danger)}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mode-btn{border:1px solid #d8d6cf;background:#fff;border-radius:9px;padding:10px;cursor:pointer;text-align:left}.mode-btn b{display:block;font-size:13px;margin-bottom:2px}.mode-btn span{font-size:11px;color:#999}.mode-btn.on{border-color:var(--accent-border);background:var(--accent-soft);color:var(--accent)}.mode-btn.on span{color:var(--accent)}
.switch-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 12px;background:#f7f6f2;border-radius:9px}.switch-copy b{display:block;font-size:13px}.switch-copy span{display:block;font-size:11px;color:#999;margin-top:2px}.switch{position:relative;width:44px;height:24px;flex:none}.switch input{opacity:0;width:0;height:0}.slider-toggle{position:absolute;inset:0;background:#cbc8c0;border-radius:999px;cursor:pointer;transition:.18s}.slider-toggle:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.18s}.switch input:checked+.slider-toggle{background:var(--accent)}.switch input:checked+.slider-toggle:before{transform:translateX(20px)}
.season-fields{margin-top:11px}.season-fields.off{opacity:.56}
.adjust{display:grid;grid-template-columns:150px 1fr 78px;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid #efede8}.adjust:last-child{border-bottom:none}.adjust-title{font-size:12px;font-weight:600}.adjust-title small{display:block;font-size:10px;color:#a09d96;font-weight:400;margin-top:2px}.adjust input[type=range]{padding:0;border:none;box-shadow:none;accent-color:var(--accent)}.adjust-value{text-align:right;font-size:11px;color:var(--accent);font-weight:700}.range-ends{display:flex;justify-content:space-between;color:#aaa;font-size:9px;margin-top:2px}
.result-box{background:#f6f5f1;border:1px solid #d8d6cf;border-radius:10px;padding:15px;margin-top:12px;font-size:12px;color:#3f3d38;line-height:1.8;white-space:pre-wrap;word-break:break-word;display:none;max-height:460px;overflow-y:auto}
.copy-btn{margin-top:8px;display:none;background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent);font-weight:600}
.custom{display:none;margin-top:6px}
@media(max-width:650px){.container{padding:18px 12px 36px}.head{display:block}.edition{display:inline-block;margin-top:9px}.r2,.r3{grid-template-columns:1fr}.adjust{grid-template-columns:1fr}.adjust-value{text-align:left}.tabs{position:static}.tab{flex:1;text-align:center;padding:8px 7px}.card{padding:15px}.mode-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header class="head"><div><h1>男频版原创短剧生成器</h1><p class="subtitle" id="subtitle"></p></div><span class="edition">男频 · 独立版</span></header>
  <nav class="tabs" aria-label="创作步骤">
    <button class="tab on" type="button" data-panel="genre">① 题材 &amp; 平台</button>
    <button class="tab" type="button" data-panel="chars">② 人设配置</button>
    <button class="tab" type="button" data-panel="plot">③ 剧情框架</button>
    <button class="tab" type="button" data-panel="gen">④ 生成提示词</button>
  </nav>

  <section class="pnl on" id="p-genre">
    <div class="card"><div class="sec">目标平台</div><div class="trow" id="platforms"></div><p class="tip" id="platform-tip"></p></div>
    <div class="card"><div class="sec">核心题材 <span class="badge">建议主打 1–2 个</span></div><div id="genres"></div></div>
    <div class="card"><div class="sec">特色加料 <span class="badge">选 1–3 个形成差异</span></div><div id="twists"></div></div>
    <button class="nbtn" type="button" data-go="chars">下一步：配置人设 →</button>
  </section>

  <section class="pnl" id="p-chars">
    <div class="ctabs" id="char-tabs"></div><div id="char-panels"></div>
    <button class="nbtn" type="button" data-go="plot">下一步：剧情框架 →</button>
  </section>

  <section class="pnl" id="p-plot">
    <div class="card">
      <div class="sec">剧集类型</div>
      <div class="mode-row">
        <button class="mode-btn" type="button" data-mode="长剧"><b>长剧</b><span>完整篇幅、持续成长、多阶段主线</span></button>
        <button class="mode-btn on" type="button" data-mode="短剧"><b>短剧</b><span>高密度钩子、快速兑现、可拍优先</span></button>
      </div>
    </div>
    <div class="card">
      <div class="sec">剧集规格</div>
      <div class="r3">
        <div class="f"><label for="format">呈现形式</label><select id="format"></select></div>
        <div class="f"><label for="duration">单集时长</label><select id="duration"></select></div>
        <div class="f"><label for="hook">钩子密度</label><select id="hook"></select></div>
      </div>
      <div class="switch-row">
        <div class="switch-copy"><b>是否开启分季</b><span>关闭时按单部完整故事规划；开启后读取下方自定义数值</span></div>
        <label class="switch" aria-label="开启分季"><input id="season-toggle" type="checkbox"><span class="slider-toggle"></span></label>
      </div>
      <div class="season-fields off" id="season-fields">
        <div class="r2">
          <div class="f"><label for="season-total">总季数 <small>（默认空白，留空表示不限制）</small></label><input id="season-total" type="number" min="1" step="1" inputmode="numeric" placeholder="例如 30、60；留空不限" disabled></div>
          <div class="f"><label for="season-eps">单季集数 <small>（默认空白，自由填写）</small></label><input id="season-eps" type="number" min="1" step="1" inputmode="numeric" placeholder="例如 5、10、12" disabled></div>
        </div>
      </div>
      <p class="tip" id="season-summary">当前未开启分季，将按单部完整故事生成。</p>
    </div>
    <div class="card"><div class="sec">专属调节参数 <small>滑块会写入最终提示词</small></div><div id="adjustments"></div><div class="r2" id="select-adjustments" style="margin-top:12px"></div></div>
    <div class="card">
      <div class="sec">核心剧情弧</div>
      <div class="f"><label for="a1">第一幕：开篇钩子与起势</label><textarea id="a1" rows="2"></textarea></div>
      <div class="f"><label for="a2">第二幕：升级、关系与阻力</label><textarea id="a2" rows="2"></textarea></div>
      <div class="f"><label for="a3">第三幕：阶段兑现与闭环</label><textarea id="a3" rows="2"></textarea></div>
    </div>
    <div class="card"><div class="f"><label for="unique">差异化亮点（独特职业、世界规则、视觉意象或人物关系）</label><textarea id="unique" rows="2"></textarea></div></div>
    <button class="nbtn" type="button" data-go="gen">下一步：生成提示词 →</button>
  </section>

  <section class="pnl" id="p-gen">
    <div class="card"><div class="sec">本次生成内容</div><div class="trow" id="outputs"></div></div>
    <div class="card"><div class="sec">写作风格</div><div class="trow" id="styles"></div></div>
    <button class="sbtn" type="button" id="generate">✦ 生成完整创作提示词</button>
    <div id="result-box" class="result-box" aria-live="polite"></div>
    <button id="copy-btn" class="copy-btn" type="button">📋 复制提示词</button>
    <p class="tip">生成后可直接复制给 AI 助手继续创作；所有选择与自定义参数都会进入提示词。</p>
  </section>
</div>

INTJ:['战略思维强、独立自主、目标导向、洞察力锐利','过度理性、情感压抑、对失控高度焦虑'],INTP:['逻辑严密、善于分析、思维独特、客观冷静','情感表达困难、容易拖延、过度纠结细节'],ENTJ:['强势决断、领导力强、战略眼光、执行果断','控制欲强、习惯用安排代替沟通'],ENTP:['思维敏锐、善辩、创意丰富、适应力强','容易分心、为辩而辩、忽视细节'],INFJ:['洞察深、共情强、有原则、理想主义','完美主义、过度敏感、容易耗竭'],INFP:['温柔感性、审美突出、共情力强','压抑需求、逃避正面冲突、理想化'],ENFJ:['善于共情、凝聚他人、感染力强','过度干涉、自我牺牲、在意评价'],ENFP:['热情灵活、创意丰富、善于鼓舞','注意力分散、承诺兑现不稳、情绪化'],ISTJ:['可靠严谨、重承诺、细节扎实','固执守旧、情感表达生硬'],ISFJ:['体贴忠诚、耐心周到、责任感强','过度牺牲、难以拒绝、压抑情绪'],ESTJ:['务实高效、规则清晰、执行果断','强势控制、缺少弹性、忽视感受'],ESFJ:['热情周全、重视关系、善于照顾','在意眼光、回避冲突、容易讨好'],ISTP:['冷静敏捷、动手能力强、危机处理快','情感疏离、回避承诺、独来独往'],ISFP:['温和细腻、审美敏锐、尊重自由','逃避冲突、表达困难、容易退让'],ESTP:['行动果敢、应变极快、敢于冒险','缺乏长线规划、冲动、目的性强'],ESFP:['活力充沛、直率热情、感染力强','注意力短、冲动、回避深层问题']};
const PERS={INTJ:['清醒理智·步步为营','外冷内傲·目标至上','隐忍布局·后发制人'],INTP:['疏离寡言·逻辑至上','古怪天才·我行我素','冷静旁观·一针见血'],ENTJ:['强势掌控·杀伐果断','天生上位·不容置疑','雷厉风行·以势破局'],ENTP:['机敏毒舌·不按常理','表面散漫·实则精明','善设圈套·以智取胜'],INFJ:['温柔坚定·洞察人心','外柔内刚·默默守护','理想清醒·守住底线'],INFP:['温柔感性·内心执拗','理想主义·为信念孤勇','安静敏锐·慢热坚定'],ENFJ:['暖场领袖·极会共情','八面玲珑·真心待人','善于凝聚·责任感强'],ENFP:['元气开朗·古灵精怪','热情跳脱·随机应变','自来熟·情绪外放'],ISTJ:['沉稳守序·重诺靠谱','一板一眼·克制严谨','务实坚韧·不善表达'],ISFJ:['温柔体贴·默默付出','心软忠诚·细致周到','克制隐忍·重视家庭'],ESTJ:['雷厉风行·重规则','强势务实·说一不二','目标导向·效率至上'],ESFJ:['热情周全·重和谐','顾家暖心·在意评价','善于经营关系'],ISTP:['冷面利落·话少事多','危机不慌·动手极强','独来独往·关键可靠'],ISFP:['温和随性·审美突出','慢热内秀·避开争执','柔软坚定·自有边界'],ESTP:['果敢冒险·行动派','社交强势·临场制胜','玩世不恭·关键靠谱'],ESFP:['直率热辣·感染力强','活力四射·敢爱敢恨','即兴洒脱·情绪外显']};
const S={platforms:[CONFIG.defaults.platform],genres:[CONFIG.defaults.genre],twists:[],outputs:[CONFIG.defaults.output],styles:[CONFIG.defaults.style],seriesType:'短剧'};

function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function el(id){return document.getElementById(id);}
function renderTagSet(target,groups,key){const root=el(target);root.innerHTML='';groups.forEach(g=>{const label=document.createElement('div');label.className='slabel';label.textContent=g.label;root.appendChild(label);const row=document.createElement('div');row.className='trow';g.items.forEach(item=>{const b=document.createElement('button');b.type='button';b.className='tag'+(S[key].includes(item)?' on':'');b.textContent=item;b.addEventListener('click',()=>{const i=S[key].indexOf(item);if(i>=0)S[key].splice(i,1);else S[key].push(item);b.classList.toggle('on');});row.appendChild(b);});root.appendChild(row);});}
function simpleTags(target,items,key){renderTagSet(target,[{label:'',items}],key);const first=el(target).querySelector('.slabel');if(first)first.remove();}
function optionHtml(items,placeholder='— 选择 —'){return '<option value="">'+esc(placeholder)+'</option>'+items.map(x=>'<option>'+esc(x)+'</option>').join('')+'<option value="__custom__">✏️ 自定义...</option>';}
function groupedOptions(groups){let out='<option value="">— 选择 —</option>';groups.forEach(g=>{out+='<optgroup label="'+esc(g.label)+'">'+g.items.map(x=>'<option>'+esc(x)+'</option>').join('')+'</optgroup>';});return out+'<option value="__custom__">✏️ 自定义...</option>';}
function customSelect(id,html){return '<select id="'+id+'" data-custom-select>'+html+'</select><input class="custom" id="'+id+'-custom" placeholder="填写自定义内容">';}
function renderCharacters(){const tabs=el('char-tabs'),panels=el('char-panels');tabs.innerHTML='';panels.innerHTML='';CONFIG.roles.forEach((r,i)=>{const t=document.createElement('button');t.type='button';t.className='ct'+(i===0?' on':'');t.textContent=r.tab;t.addEventListener('click',()=>switchChar(i));tabs.appendChild(t);const p=document.createElement('div');p.className='cpnl'+(i===0?' on':'');p.id='role-panel-'+i;const genderField=r.gender==='可选'?'<div class="f"><label>性别</label><select id="r'+i+'-gender"><option>男</option><option>女</option></select></div>':'<input id="r'+i+'-gender" type="hidden" value="'+esc(r.gender)+'">';p.innerHTML='<div class="card"><div class="sec">'+esc(r.title)+(r.required?' <span class="badge">核心角色</span>':' <small>可选</small>')+'</div><div class="r2"><div class="f"><label>角色名字</label><div class="nrow"><input id="r'+i+'-name" placeholder="自定义，或点随机生成"><button class="rbtn" type="button" data-random="'+i+'">🎲 随机名</button></div></div>'+genderField+'</div><div class="r2"><div class="f"><label>'+esc(r.archetypeLabel||'人物原型 / 身份')+'</label>'+customSelect('r'+i+'-type',groupedOptions(r.groups))+'</div><div class="f"><label>隐藏身份 / 关键底牌</label>'+customSelect('r'+i+'-hidden',optionHtml(r.hidden||[],'— 可留空 —'))+'</div></div><div class="r2"><div class="f"><label>MBTI</label><select id="r'+i+'-mbti"><option value="">— 选择 —</option>'+Object.keys(MBTI).map(k=>'<option value="'+k+'">'+k+'</option>').join('')+'</select><div class="bx" id="r'+i+'-mbti-box">选择后显示优势与人物阴影</div></div><div class="f"><label>性格 / 气质</label>'+customSelect('r'+i+'-personality',optionHtml([]))+'</div></div><div class="r2"><div class="f"><label>核心驱动力</label>'+customSelect('r'+i+'-drive',optionHtml(r.drives||[]))+'</div><div class="f"><label>与主角的初始关系 / 态度</label><input id="r'+i+'-relation" placeholder="'+esc(r.relationPlaceholder||'可留空，由 AI 设计')+'"></div></div><div class="f"><label>能力、弱点、秘密或人物弧备注</label><input id="r'+i+'-note" placeholder="'+esc(r.notePlaceholder||'写一个能推动剧情的具体设定')+'"></div></div>';panels.appendChild(p);});document.querySelectorAll('[data-custom-select]').forEach(s=>s.addEventListener('change',()=>{el(s.id+'-custom').style.display=s.value==='__custom__'?'block':'none';}));document.querySelectorAll('[data-random]').forEach(b=>b.addEventListener('click',()=>randomName(Number(b.dataset.random))));CONFIG.roles.forEach((_,i)=>el('r'+i+'-mbti').addEventListener('change',()=>updateMbti(i)));}
function switchChar(i){document.querySelectorAll('.ct').forEach((x,n)=>x.classList.toggle('on',n===i));document.querySelectorAll('.cpnl').forEach((x,n)=>x.classList.toggle('on',n===i));}
function updateMbti(i){const k=el('r'+i+'-mbti').value,box=el('r'+i+'-mbti-box'),sel=el('r'+i+'-personality');if(!k){box.textContent='选择后显示优势与人物阴影';sel.innerHTML=optionHtml([]);return;}box.innerHTML='<b>优势：</b>'+esc(MBTI[k][0])+'<br><span class="neg">人物阴影：'+esc(MBTI[k][1])+'</span>';sel.innerHTML=optionHtml(PERS[k]);el(sel.id+'-custom').style.display='none';}
function randomName(i){const role=CONFIG.roles[i],gender=role.gender==='可选'?el('r'+i+'-gender').value:role.gender;const pool=gender==='女'?CONFIG.names.female:CONFIG.names.male;el('r'+i+'-name').value=pool[Math.floor(Math.random()*pool.length)];}
function readSelect(id){const s=el(id);if(!s)return'';return s.value==='__custom__'?(el(id+'-custom').value.trim()):s.value;}
function renderAdjustments(){const root=el('adjustments');root.innerHTML='';CONFIG.ranges.forEach((a,i)=>{const row=document.createElement('div');row.className='adjust';row.innerHTML='<div class="adjust-title">'+esc(a.label)+'<small>'+esc(a.help||'')+'</small></div><div><input id="range-'+i+'" type="range" min="0" max="100" step="10" value="'+(a.value??50)+'"><div class="range-ends"><span>'+esc(a.low)+'</span><span>'+esc(a.high)+'</span></div></div><div class="adjust-value" id="range-value-'+i+'"></div>';root.appendChild(row);el('range-'+i).addEventListener('input',()=>updateRange(i));updateRange(i);});const sels=el('select-adjustments');sels.innerHTML='';CONFIG.selects.forEach((a,i)=>{const d=document.createElement('div');d.className='f';d.innerHTML='<label>'+esc(a.label)+'</label><select id="select-adjust-'+i+'">'+a.options.map((x,n)=>'<option'+(n===(a.default||0)?' selected':'')+'>'+esc(x)+'</option>').join('')+'</select>';sels.appendChild(d);});}
function updateRange(i){const a=CONFIG.ranges[i],v=Number(el('range-'+i).value);let phrase=v<=30?a.low:(v>=70?a.high:(a.mid||'中等'));el('range-value-'+i).textContent=v+' · '+phrase;}
function setPanel(id){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.panel===id));document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));el('p-'+id).classList.add('on');window.scrollTo({top:0,behavior:'smooth'});}
function seasonState(){const on=el('season-toggle').checked;['season-total','season-eps'].forEach(id=>el(id).disabled=!on);el('season-fields').classList.toggle('off',!on);const total=el('season-total').value,eps=el('season-eps').value;el('season-summary').textContent=on?'已开启分季：总季数'+(total?total+'季':'不限')+'；单季集数'+(eps?eps+'集':'待定，可后续自由填写')+'。':'当前未开启分季，将按单部完整故事生成。';}
function characterText(){const blocks=[];CONFIG.roles.forEach((r,i)=>{const name=el('r'+i+'-name').value.trim(),type=readSelect('r'+i+'-type'),hidden=readSelect('r'+i+'-hidden'),mbti=el('r'+i+'-mbti').value,personality=readSelect('r'+i+'-personality'),drive=readSelect('r'+i+'-drive'),relation=el('r'+i+'-relation').value.trim(),note=el('r'+i+'-note').value.trim(),gender=el('r'+i+'-gender').value;if(!r.required&&!name&&!type&&!hidden&&!note)return;let b='▸ '+r.title+'：'+(name||'（未命名）')+'（'+gender+'）\n  人物原型/身份：'+(type||'未指定');if(hidden)b+='\n  隐藏身份/底牌：'+hidden;if(mbti)b+='\n  MBTI：'+mbti+'\n  优势：'+MBTI[mbti][0]+'\n  人物阴影：'+MBTI[mbti][1];if(personality)b+='\n  性格气质：'+personality;if(drive)b+='\n  核心驱动力：'+drive;if(relation)b+='\n  初始关系/态度：'+relation;if(note)b+='\n  备注：'+note;blocks.push(b);});return blocks.join('\n\n');}
function adjustmentText(){const lines=CONFIG.ranges.map((a,i)=>a.label+'：'+el('range-value-'+i).textContent);CONFIG.selects.forEach((a,i)=>lines.push(a.label+'：'+el('select-adjust-'+i).value));return lines.join('\n');}
function structureText(){const seasonOn=el('season-toggle').checked,total=el('season-total').value,eps=el('season-eps').value;let season=seasonOn?'开启分季\n总季数：'+(total?total+'季':'不设上限')+'\n单季集数：'+(eps?eps+'集':'未指定，由 AI 结合故事体量规划'):'不开启分季，按单部完整故事闭环';return '剧集类型：'+S.seriesType+'\n呈现形式：'+el('format').value+'\n单集时长：'+el('duration').value+'\n钩子密度：'+el('hook').value+'\n分季设置：'+season;}
function productionRules(){if(S.seriesType==='短剧')return '▸ 短剧执行规格\n  - 第1集前3秒必须出现可见冲突、异常信息或明确利益危机。\n  - 单集保持“冲突推进—局部兑现—新钩子”，不以重复争吵代替剧情。\n  - 若输出分镜：每条素材按约10–15秒可用时长设计，动作、表情、台词均须可拍。\n  - 台词口语化，能用动作表达就不重复解释；场景数量服从制作成本。';return '▸ 长剧执行规格\n  - 先建立全剧主线、阶段目标与人物弧，再拆分集数，避免用短剧式连续反转破坏可信度。\n  - 每集有独立戏剧任务，阶段节点必须改变人物关系、资源或局势。\n  - 场景、支线和伏笔服务主线；关键转折预先埋因，不靠临时信息强行翻盘。\n  - 若输出剧本，按场次书写场景、人物、动作、表情与对白，保持可拍性。';}
function generatePrompt(){const chars=characterText();const a1=el('a1').value.trim()||'请根据题材和人物主动设计',a2=el('a2').value.trim()||'请设计阶梯升级与中段转折',a3=el('a3').value.trim()||'请完成阶段目标并回收本阶段伏笔',unique=el('unique').value.trim();const checks=CONFIG.checks.map((x,i)=>String(i+1).padStart(2,'0')+' '+x).join('\n');const txt='你是资深的'+CONFIG.audience+'短剧/剧集编剧与内容策划。请严格按照以下立项配置创作，先保证人物动机、因果和可拍性，再追求情绪强度。\n\n════════════════════════════════════\n【项目定位】\n目标平台：'+(S.platforms.join('、')||'未指定')+'\n核心题材：'+(S.genres.join('、')||'未指定')+(S.twists.length?'\n特色加料：'+S.twists.join('、'):'')+'\n\n════════════════════════════════════\n【人设档案】\n'+(chars||'请根据题材补全主要人物')+'\n\n════════════════════════════════════\n【结构规格】\n'+structureText()+'\n\n'+productionRules()+'\n\n════════════════════════════════════\n【专属调节参数】\n'+adjustmentText()+'\n\n════════════════════════════════════\n【核心剧情弧】\n第一幕（开篇钩子与起势）：'+a1+'\n第二幕（升级、关系与阻力）：'+a2+'\n第三幕（阶段兑现与闭环）：'+a3+(unique?'\n差异化亮点：'+unique:'')+'\n\n════════════════════════════════════\n【本次生成内容】\n'+(S.outputs.join('、')||'完整大纲（分幕）')+'\n\n════════════════════════════════════\n【共同写作规则】\n① 这是可执行的影视文本，不是只讲感受的小说梗概；每个关键转折都写清“谁做了什么、为什么、造成什么变化”。\n② 重要信息通过行动、选择、证据和后果呈现，避免角色站着互相解释设定。\n③ 主角必须主动做选择并承担代价；配角有自身立场，不是纯粹的信息工具。\n④ 爽点、甜点或虐点必须有前因和后果；先蓄力再兑现，兑现后局势真实改变。\n⑤ 每集结尾的钩子在悬念、关系、利益、身份、危机之间轮换，避免机械重复。\n⑥ 敏感职业、医疗、法律、军事、历史与安全知识不胡编为现实结论；避免拜金、低俗擦边、性别对立与违法行为美化。\n⑦ 若用户填写的参数互相冲突，先指出冲突，再给出最接近原意的可执行方案。\n\n风格：'+(S.styles.join('、')||'由 AI 匹配')+'\n\n════════════════════════════════════\n【'+CONFIG.logicTitle+'】\n'+CONFIG.logic+'\n\n════════════════════════════════════\n【交付前自查——逐项核对】\n'+checks+'\n\n输出结尾必须附：\n【自查结果】01✅ 02✅ ……（逐项标注 ✅达标 / ❌未达标 / ⚪不适用）\n【需修改项】如有 ❌，先完成修改再交付。';const box=el('result-box');box.textContent=txt;box.style.display='block';el('copy-btn').style.display='inline-block';box.scrollIntoView({behavior:'smooth',block:'nearest'});}
async function copyPrompt(){const text=el('result-box').textContent,btn=el('copy-btn');try{if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(text);else{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent='📋 复制提示词',1800);}catch(e){btn.textContent='复制失败，请手动选择';}}
function init(){document.documentElement.style.setProperty('--accent',CONFIG.theme.accent);document.documentElement.style.setProperty('--accent-soft',CONFIG.theme.soft);document.documentElement.style.setProperty('--accent-border',CONFIG.theme.border);el('subtitle').textContent=CONFIG.subtitle;el('platform-tip').textContent=CONFIG.platformTip;simpleTags('platforms',CONFIG.platforms,'platforms');renderTagSet('genres',CONFIG.genreGroups,'genres');renderTagSet('twists',CONFIG.twistGroups,'twists');renderCharacters();renderAdjustments();simpleTags('outputs',CONFIG.outputs,'outputs');simpleTags('styles',CONFIG.styles,'styles');['format','duration','hook'].forEach(id=>{CONFIG[id+'s'].forEach(x=>el(id).add(new Option(x,x)));});el('a1').placeholder=CONFIG.placeholders.a1;el('a2').placeholder=CONFIG.placeholders.a2;el('a3').placeholder=CONFIG.placeholders.a3;el('unique').placeholder=CONFIG.placeholders.unique;document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>setPanel(t.dataset.panel)));document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>setPanel(b.dataset.go)));document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{S.seriesType=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('on',x===b));}));el('season-toggle').addEventListener('change',seasonState);el('season-total').addEventListener('input',seasonState);el('season-eps').addEventListener('input',seasonState);el('generate').addEventListener('click',generatePrompt);el('copy-btn').addEventListener('click',copyPrompt);}
init();
</script>
